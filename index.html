<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화이트펜슬 스터디카페</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#1b4332;
  --green-mid:#2d6a4f;
  --border:#e2e0d8;
  --ink3:#9a9a8e;
  --amber:#b45309;
  --amber-bg:#fffbeb;
  --amber-border:#fde68a;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Noto Sans KR',sans-serif;display:flex;flex-direction:column;}

/* ── HEADER ── */
.site-header{
  height:36px;background:var(--green);color:#fff;
  padding:0 12px;display:flex;align-items:center;gap:8px;
  flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.25);z-index:100;
}
.site-header img{height:20px;width:20px;object-fit:contain;border-radius:4px;}
.header-title{font-size:12px;font-weight:700;letter-spacing:-.02em;}
.header-sub{font-size:8px;color:#95d5b2;font-family:'DM Mono',monospace;letter-spacing:.06em;margin-top:1px;}

/* ── 상단 탭바 (고객용 5개) ── */
.top-tab-bar{
  height:48px;display:flex;background:#fff;
  border-bottom:2px solid var(--border);flex-shrink:0;z-index:99;
}
.top-tab-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;background:none;color:var(--ink3);
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;
  border-bottom:3px solid transparent;
  transition:color .15s,border-color .15s,background .15s;
  position:relative;bottom:-2px;padding:0 4px;
  word-break:keep-all;text-align:center;line-height:1.3;
}
.top-tab-btn.active{color:var(--green-mid);border-bottom-color:var(--green-mid);background:#f7fbf8;}

/* ── IFRAME 영역 ── */
.panel-wrap{flex:1;position:relative;overflow:hidden;}
.iframe-panel{position:absolute;inset:0;display:none;}
.iframe-panel.active{display:block;}
.iframe-panel iframe{width:100%;height:100%;border:none;display:block;}

/* ── 하단 탭바 (지점별 한마디+출석체크) ── */
.bottom-tab-bar{
  height:38px;display:flex;
  border-top:2px solid var(--amber-border);
  flex-shrink:0;z-index:99;
}
.bottom-tab-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:none;background:none;color:#92400e;
  font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;
  border-top:3px solid transparent;
  transition:color .15s,border-color .15s,background .15s;
  position:relative;top:-2px;padding:0 2px;
  word-break:keep-all;text-align:center;line-height:1.3;
}
.bottom-tab-btn.active{color:var(--amber);border-top-color:var(--amber);}

/* 지점별 배경색 */
.bg-gasan   { background:#fff8f0; }
.bg-geumcheon { background:#f0f7ff; }
.bg-guro    { background:#f3f0ff; }
.bg-gasan.active   { background:#ffe8cc; }
.bg-geumcheon.active { background:#cce4ff; }
.bg-guro.active    { background:#e2daff; }

/* 하단 구분선 */
.bottom-tab-bar .divider{
  width:2px;background:var(--amber-border);flex-shrink:0;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <img src="https://play-lh.googleusercontent.com/aVTlh7-EuRIYzIPrVA1rkLxaMubV22zsVTKxcijMxmoAhuSZuxwP9Aq2pCbuw9EesLRk=w240-h480-rw" alt="화이트펜슬 로고">
  <div>
    <div class="header-title">화이트펜슬 스터디카페</div>
    <div class="header-sub">WHITEPENCIL STUDY CAFÉ</div>
  </div>
</header>

<!-- 상단 탭바 : 고객용 -->
<nav class="top-tab-bar">
  <button class="top-tab-btn active" onclick="switchTop('calc')" id="tab-calc">
    멤버십·등급할인
  </button>
  <button class="top-tab-btn" onclick="switchTop('library')" id="tab-library">
    가산도서관특가
  </button>
  <button class="top-tab-btn" onclick="switchTop('voice')" id="tab-voice">
    소통함
  </button>
  <button class="top-tab-btn" onclick="openFaq()" id="tab-faq">
    FAQ
  </button>
  <button class="top-tab-btn" onclick="switchTop('refund')" id="tab-refund">
    환불계산기
  </button>
</nav>

<!-- IFRAME PANELS -->
<div class="panel-wrap">

  <!-- 고객용 -->
  <div class="iframe-panel active" id="panel-calc">
    <iframe src="https://yoosangbeom.github.io/whitepencil-membership/" title="멤버십 요금 계산기" loading="lazy"></iframe>
  </div>
  <div class="iframe-panel" id="panel-library">
    <iframe src="https://yoosangbeom.github.io/Gasan_library_coupon/" title="가산도서관 휴관일 할인" loading="lazy"></iframe>
  </div>
  <div class="iframe-panel" id="panel-voice">
    <iframe src="https://yoosangbeom.github.io/whitepencil-voice/" title="화이트펜슬 소통함" loading="lazy"></iframe>
  </div>
  <div class="iframe-panel" id="panel-refund">
    <iframe src="https://yoosangbeom.github.io/refund-calculator/" title="환불 계산기" loading="lazy"></iframe>
  </div>

  <!-- 가산 -->
  <div class="iframe-panel" id="panel-gasan-postit">
    <iframe src="https://script.google.com/macros/s/AKfycbzcKku8quWmaDOQHiVPAoW-iqUAFzusXM9UuDmI7w6tkaHnmWWA3fg9bXTvshMOBk9F/exec?page=postit" title="가산 한마디" loading="lazy"></iframe>
  </div>
  <div class="iframe-panel" id="panel-gasan-att">
    <iframe src="https://script.google.com/macros/s/AKfycbzcKku8quWmaDOQHiVPAoW-iqUAFzusXM9UuDmI7w6tkaHnmWWA3fg9bXTvshMOBk9F/exec?page=rank_only" title="가산 출석체크" loading="lazy"></iframe>
  </div>

  <!-- 금천 -->
  <div class="iframe-panel" id="panel-geumcheon-postit">
    <iframe src="https://script.google.com/macros/s/AKfycbzxQiB04tHAmSmokQWb0vxSxw0r_hipgxQcOZAaZja2AvF6pOig8WvOOiukXZbXwOBV/exec?page=postit" title="금천 한마디" loading="lazy"></iframe>
  </div>
  <div class="iframe-panel" id="panel-geumcheon-att">
    <iframe src="https://script.google.com/macros/s/AKfycbzxQiB04tHAmSmokQWb0vxSxw0r_hipgxQcOZAaZja2AvF6pOig8WvOOiukXZbXwOBV/exec?page=rank_only" title="금천 출석체크" loading="lazy"></iframe>
  </div>

  <!-- 구로 -->
  <div class="iframe-panel" id="panel-guro-postit">
    <iframe src="https://script.google.com/macros/s/AKfycbyQbwTVvf31E-0gCrGZQoNo-2TD9JQrVnbS7Ux_nrZPtY33xKlzeYx4X0kjKMPOde9aHA/exec?page=postit" title="구로 한마디" loading="lazy"></iframe>
  </div>
  <div class="iframe-panel" id="panel-guro-att">
    <iframe src="https://script.google.com/macros/s/AKfycbyQbwTVvf31E-0gCrGZQoNo-2TD9JQrVnbS7Ux_nrZPtY33xKlzeYx4X0kjKMPOde9aHA/exec?page=rank_only" title="구로 출석체크" loading="lazy"></iframe>
  </div>

</div>

<!-- 하단 탭바 : 지점별 한마디 + 출석체크 -->
<nav class="bottom-tab-bar">
  <button class="bottom-tab-btn bg-gasan" onclick="switchBottom('gasan-postit')" id="btab-gasan-postit">
    가산한마디
  </button>
  <button class="bottom-tab-btn bg-gasan" onclick="switchBottom('gasan-att')" id="btab-gasan-att">
    가산랭킹
  </button>
  <div class="divider"></div>
  <button class="bottom-tab-btn bg-geumcheon" onclick="switchBottom('geumcheon-postit')" id="btab-geumcheon-postit">
    금천한마디
  </button>
  <button class="bottom-tab-btn bg-geumcheon" onclick="switchBottom('geumcheon-att')" id="btab-geumcheon-att">
    금천랭킹
  </button>
  <div class="divider"></div>
  <button class="bottom-tab-btn bg-guro" onclick="switchBottom('guro-postit')" id="btab-guro-postit">
    구로한마디
  </button>
  <button class="bottom-tab-btn bg-guro" onclick="switchBottom('guro-att')" id="btab-guro-att">
    구디랭킹
  </button>
</nav>

<script>
function switchTop(id) {
  document.querySelectorAll('.iframe-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.top-tab-btn, .bottom-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('tab-' + id).classList.add('active');
}
function switchBottom(id) {
  document.querySelectorAll('.iframe-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.top-tab-btn, .bottom-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  document.getElementById('btab-' + id).classList.add('active');
}
function openFaq() {
  window.open('https://whitepencil.notion.site/FAQ-613e4d255aa0493e80564952e15f11d2', '_blank');
}
</script>
</body>
</html>
